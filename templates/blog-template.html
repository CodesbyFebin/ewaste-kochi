    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | EWaste Kochi Blog</title>
    <meta name="description" content="{{META_DESC}}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0A0F0C;
            --bg2: #111A14;
            --surface: #182118;
            --border: rgba(0,230,100,.13);
            --green: #00E664;
            --green2: #00C463;
            --white: #E8F2EA;
            --text: #9BB8A2;
            --font-head: 'Bebas Neue', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Cyber Grid Overlay */
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,230,100,.018) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,100,.018) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
        
        /* Nav (Simplified for Blog) */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,15,12,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            height: 70px; display: flex; align-items: center; justify-items: center;
        }
        .nav-inner { width: 100%; max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; }
        .logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--white); text-decoration: none; }

        /* Hero */
        .hero { padding: 100px 0 60px; text-align: center; }
        .hero-badge { display: inline-block; padding: 6px 14px; background: rgba(0,230,100,0.1); color: var(--green); border-radius: 100px; font-family: var(--font-mono); font-size: 0.75rem; margin-bottom: 24px; border: 1px solid rgba(0,230,100,0.2); }
        .hero h1 { font-family: var(--font-head); font-size: clamp(3.5rem, 8vw, 6rem); color: var(--white); line-height: 0.95; margin-bottom: 30px; letter-spacing: -1px; }
        .hero h1 span { color: var(--green); }
        .hero p { font-size: 1.25rem; opacity: 0.8; }

        /* Blog Content Cards */
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; padding: 48px; margin-bottom: 40px; }
        .card h2 { font-family: var(--font-head); font-size: 2.5rem; color: var(--white); margin-bottom: 24px; letter-spacing: 1px; }
        .card h3 { color: var(--green); font-family: var(--font-mono); font-size: 0.8rem; margin-bottom: 12px; letter-spacing: 2px; }
        .benefit-list { margin-top: 20px; list-style: none; }
        .benefit-list li { margin-bottom: 12px; position: relative; padding-left: 24px; }
        .benefit-list li::before { content: '➔'; position: absolute; left: 0; color: var(--green); font-weight: 800; }

        /* Process Steps */
        .step-card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .step-num { display: block; font-family: var(--font-head); font-size: 2rem; color: var(--green); margin-bottom: 10px; }

        /* FAQ */
        .faq-item { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .faq-item strong { display: block; color: var(--white); margin-bottom: 10px; font-size: 1.1rem; }

        /* CTA */
        .cta-funnel { background: var(--green); color: var(--bg); padding: 80px 40px; border-radius: 32px; text-align: center; margin: 80px 0; }
        .cta-funnel h2 { font-family: var(--font-head); font-size: 4rem; line-height: 1; margin-bottom: 20px; }
        .btn-primary { display: inline-block; background: var(--bg); color: var(--white); padding: 20px 40px; border-radius: 16px; text-decoration: none; font-weight: 800; font-family: var(--font-body); }

        footer { padding: 80px 0; text-align: center; opacity: 0.4; font-size: 0.8rem; border-top: 1px solid var(--border); }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 4rem; }
            .card { padding: 30px; }
        }
    </style>
    
    {{SCHEMA}}
</head>
