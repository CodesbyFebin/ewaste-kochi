<!-- ============================================================
     WEAPONIZED CHATBOT
     ============================================================ -->
<div class="chatbot-wrap" id="chatbot">
  <button class="chat-toggle" onclick="toggleChat()" id="chat-toggle-btn">💬<span class="chat-badge" id="chat-badge">1</span></button>
  <div class="chat-window" id="chat-window">
    <div class="chat-header"><span>🤖</span> <strong>EWaste Kochi Assistant</strong> <button class="chat-close" onclick="toggleChat()">✕</button></div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-options" id="chat-options"></div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="chat-input" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendChatMsg()">
      <button onclick="sendChatMsg()" style="background:none;border:none;color:var(--green);cursor:pointer;font-size:20px">➤</button>
    </div>
  </div>
</div>

<script>
const CHAT_TREE={
  start:{
    msg:"⚠️ **Quick Security Warning:** Did you know that a standard 'factory reset' on your old phone or laptop leaves 90% of your private data recoverable by criminals in Kochi in under 10 minutes?<br><br>I'm the EWaste Kochi Assistant. How should we protect your assets today?",
    options:[
      {label:"🛡️ Stop the Risk",next:'wa'},
      {label:"💰 Get Peak Pricing",next:'wa'},
      {label:"🏢 Corporate ITAD",next:'wa'}
    ]
  },
  wa:{
    msg:"Our specialized team is available now on WhatsApp to provide a secure quote and schedule your pickup. Proceed?",
    options:[{label:"💬 Open WhatsApp →",next:'wa_open'}]
  },
  wa_open:{
    msg:"Opening WhatsApp...",
    action:()=>window.open('https://wa.me/917500555454?text=Hi%2C+I+need+help+with+e-waste+services+in+Kochi','_blank')
  }
};

let chatOpen=false;
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chat-window').classList.toggle('open');
  if(chatOpen && document.getElementById('chat-messages').children.length===0){
    addBotMsg(CHAT_TREE.start.msg, 500);
    setTimeout(()=>showOptions(CHAT_TREE.start), 700);
  }
}
function addBotMsg(text,delay=0){
  setTimeout(()=>{
    const msgs=document.getElementById('chat-messages');
    const div=document.createElement('div');
    div.className='chat-msg bot';
    div.innerHTML=`<div class="chat-bubble">${text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  },delay);
}
function addUserMsg(text){
    const msgs=document.getElementById('chat-messages');
    const div=document.createElement('div');
    div.className='chat-msg user';
    div.innerHTML=`<div class="chat-bubble">${text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
}
function showOptions(node){
    const opts=document.getElementById('chat-options');
    opts.innerHTML='';
    if(node.options){
        node.options.forEach(opt=>{
            const btn=document.createElement('button');
            btn.className='chat-opt';
            btn.textContent=opt.label;
            btn.onclick=()=>{
                addUserMsg(opt.label);
                const next=CHAT_TREE[opt.next];
                if(next.action)next.action();
                addBotMsg(next.msg, 500);
                setTimeout(()=>showOptions(next), 700);
            };
            opts.appendChild(btn);
        });
    }
}
function sendChatMsg(){
    const input=document.getElementById('chat-input');
    const text=input.value.trim();
    if(!text)return;
    input.value='';
    addUserMsg(text);
    addBotMsg("I'll pass that to our team! WhatsApp +91-7500555454 for an instant answer.", 600);
}
setTimeout(()=>{ if(!chatOpen) toggleChat(); }, 8000);
</script>
