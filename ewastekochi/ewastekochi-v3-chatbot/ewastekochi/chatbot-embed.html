  --ew-white:   #F0F7F2;

}

.ew-tooltip {

  border-right:1px solid var(--ew-border2);
  border-bottom:1px solid var(--ew-border2);

<script>

  homepage: {

    systemPrompt: `You are the AI sales assistant for EWasteKochi, Kerala's #1 certified ITAD and e-waste recycling facility in Kochi.

End every response with a WhatsApp nudge if the conversation is 2+ messages deep.
Never give long answers. Concise = converts better.`,

    systemPrompt: `You are EWasteKochi's collection specialist AI.

    greeting: '🚛 Ready to schedule your e-waste pickup?\n\nWe can pick up **today** in most Kochi areas — completely free for 50+ units!',
    quickReplies: ['📅 Book Today\'s Slot', '📍 Check My Area', '📦 How Many Items?', '📞 Call Now'],
    hook: '⚡ Limited same-day slots left. WhatsApp by 12PM.',

  },

  recycling: {
    label: '♻️ E-Waste Recycling',
    systemPrompt: `You are EWasteKochi's sustainability specialist AI.

KEY FACTS:
- KSPCB Authorization — only legal way to recycle e-waste in Kerala
- 100% responsible processing — nothing goes to landfill
- Precious metals (gold, silver, copper) recovered responsibly
- Toxic components (batteries, CRTs) processed through certified hazmat channels
- CSR-eligible recycling documentation available
- Haritha Karma Sena partnership for community drives
- E-Waste Management Rules 2022 compliant

SALES APPROACH: Eco-credibility first. "Here's what actually happens to your device." Trust → convert. Offer to send a Certificate of Responsible Recycling.`,
    greeting: '🌿 Choosing certified recycling makes a real difference.\n\nEWasteKochi is **KSPCB authorized** — nothing we collect goes to landfill. What are you looking to recycle?',
    quickReplies: ['💻 Old Laptop', '📱 Old Phones', '🏢 Office Clearance', '📋 CSR Drive'],
    hook: '🌱 100% responsible recycling — certified, documented, zero landfill.',
    waTemplate: 'Hi, I want to responsibly recycle my e-waste in Kochi. I have: ',
  },

  laptop: {
    label: '💻 Laptop Disposal',
    systemPrompt: `You are EWasteKochi's laptop buyback specialist AI.

// ════════════════════════════════════════════════════════════
// CHAT OPEN/CLOSE
// ════════════════════════════════════════════════════════════
function ewToggle() {
  isOpen ? ewClose() : ewOpen();
}

function ewOpen() {
  isOpen = true;
  document.getElementById('ewWindow').classList.add('open');
  document.getElementById('ewLauncherBtn').classList.add('open');
  document.getElementById('ewNotif').style.display = 'none';
  document.getElementById('ewTooltip').style.display = 'none';

  // First open: start conversation
  if (conversationHistory.length === 0) {
    setTimeout(ewStartConversation, 400);
  }

  // Focus input
  setTimeout(() => {
    const input = document.getElementById('ewInput');
    if (input) input.focus();
  }, 500);

  // Track
  if (window.dataLayer) dataLayer.push({event:'chat_open', page_context:PAGE_CONTEXT});
}

function ewClose() {
  isOpen = false;
  document.getElementById('ewWindow').classList.remove('open');
  document.getElementById('ewLauncherBtn').classList.remove('open');
}

// ════════════════════════════════════════════════════════════
// CONVERSATION INIT
// ════════════════════════════════════════════════════════════
async function ewStartConversation() {
  // Show typing first
  const typingId = ewShowTyping();
  await ewDelay(900);
  ewRemoveTyping(typingId);

  // Show page-specific greeting
  ewAddBotMessage(PILLAR.greeting);
  msgCount++;

  // Show quick replies
  await ewDelay(400);
  ewShowQuickReplies(PILLAR.quickReplies);
}

// ════════════════════════════════════════════════════════════
// MESSAGE RENDERING
// ════════════════════════════════════════════════════════════
function ewAddBotMessage(text) {
  const msgs = document.getElementById('ewMessages');
  const div = document.createElement('div');
  div.className = 'ew-msg bot';
  // Parse **bold** markdown
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="ew-msg-avatar">🤖</div>
    <div class="ew-bubble">${formatted}</div>`;
  msgs.appendChild(div);
  ewScrollBottom();
  return div;
}

function ewAddUserMessage(text) {
  const msgs = document.getElementById('ewMessages');
  const div = document.createElement('div');
  div.className = 'ew-msg user';
  div.innerHTML = `
    <div class="ew-bubble">${ewEscape(text)}</div>
    <div class="ew-msg-avatar" style="background:var(--ew-surf2);">👤</div>`;
  msgs.appendChild(div);
  ewScrollBottom();
}

function ewShowTyping() {
  const msgs = document.getElementById('ewMessages');
  const div = document.createElement('div');
  div.className = 'ew-msg bot';
  const id = 'ew-typing-' + Date.now();
  div.id = id;
  div.innerHTML = `
    <div class="ew-msg-avatar">🤖</div>
    <div class="ew-typing">
      <div class="ew-dot"></div>
      <div class="ew-dot"></div>
      <div class="ew-dot"></div>
    </div>`;
  msgs.appendChild(div);
  ewScrollBottom();
  return id;
}

function ewRemoveTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function ewShowQuickReplies(options) {
  const qr = document.getElementById('ewQuickReplies');
  qr.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ew-quick-btn';
    btn.textContent = opt;
    btn.onclick = () => ewHandleQuickReply(opt);
    qr.appendChild(btn);
  });
}

function ewClearQuickReplies() {
  document.getElementById('ewQuickReplies').innerHTML = '';
}

function ewScrollBottom() {
  const msgs = document.getElementById('ewMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════════════════════════
// SEND MESSAGE
// ════════════════════════════════════════════════════════════
async function ewSend() {
  const input = document.getElementById('ewInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  input.style.height = 'auto';
  ewSendMessage(text);
}

async function ewHandleQuickReply(text) {
  ewClearQuickReplies();
  ewSendMessage(text);
}

async function ewSendMessage(userText) {
  ewAddUserMessage(userText);
  conversationHistory.push({role:'user', content: userText});
  ewClearQuickReplies();
  msgCount++;

  // Track
  if (window.dataLayer) dataLayer.push({event:'chat_message', msg_count:msgCount, page_context:PAGE_CONTEXT});

  // Disable send
  isStreaming = true;
  document.getElementById('ewSendBtn').disabled = true;

  // Show typing
  const typingId = ewShowTyping();
  await ewDelay(600 + Math.random() * 400);
  ewRemoveTyping(typingId);

  try {
    const reply = await ewCallClaude(userText);
    ewAddBotMessage(reply);
    conversationHistory.push({role:'assistant', content: reply});
    msgCount++;

    // After 2 user messages, show WA CTA
    if (msgCount >= 4) ewShowWaCta(userText);

    // After 3 user messages, offer lead form
    if (msgCount >= CONFIG.LEAD_FORM_AFTER * 2 + 1 && !leadCaptured) {
      await ewDelay(800);
      ewShowLeadForm();
    }

    // Contextual quick replies based on conversation stage
    if (msgCount < 6) {
      ewShowQuickReplies(ewGetContextualReplies(reply));
    }

  } catch(err) {
    ewAddBotMessage('Sorry, I had a connection issue. For instant help:\n\n💬 **WhatsApp: +91XXXXXXXXXX**\n📞 **Call: ' + CONFIG.PHONE + '**');
    ewShowWaCta(userText);
  }

  isStreaming = false;
  document.getElementById('ewSendBtn').disabled = false;
}

// ════════════════════════════════════════════════════════════
// CLAUDE API CALL
// ════════════════════════════════════════════════════════════
async function ewCallClaude(userMessage) {
  // Build messages for API
  const messages = [...conversationHistory];
  // Remove the last user message since it's already in history
  if (messages[messages.length-1]?.role === 'user') {
    messages.pop();
  }
  // Add it back as the current message
  const apiMessages = conversationHistory.slice(-8); // Last 8 for context window management

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-dangerous-allow-browser-access': 'true',
    },
    body: JSON.stringify({
      model: CONFIG.MODEL,
      max_tokens: CONFIG.MAX_TOKENS,
      system: PILLAR.systemPrompt + `

RESPONSE RULES (never break these):
1. Max 3 sentences per response. Shorter = more conversions.
2. Never use bullet lists. Conversational only.
3. If you mention a price, state it confidently with ₹ symbol.
4. After message 3, naturally suggest WhatsApp: "Want to confirm the price on WhatsApp?"
5. Don't repeat the same WhatsApp suggestion twice in a row.
6. Use **bold** for prices and key points.
7. End with a question to keep conversation going — unless pushing to WhatsApp.
8. Never say "I'm an AI" or "as an AI assistant." Just be EWasteKochi.
9. If asked about your data or privacy, briefly explain NIST 800-88 and move on.
10. If user seems ready to transact (mentioned specific device, location, or volume), push hard to WhatsApp: "Share your WhatsApp number and I'll have our team confirm in minutes."`,
      messages: apiMessages,
    }),
  });

  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  return data.content?.[0]?.text || 'Let me connect you with our team directly.';
}

// ════════════════════════════════════════════════════════════
// WHATSAPP CTA
// ════════════════════════════════════════════════════════════
function ewShowWaCta(userMessage) {
  // Build context-aware WA message
  const pageMsg = PILLAR.waTemplate;
  const waText = encodeURIComponent(
    `Hi EWasteKochi!\n\n${pageMsg}${userMessage.length < 100 ? userMessage : ''}\n\nPlease confirm details.`
  );
  const waUrl = `https://wa.me/${CONFIG.WA_NUMBER}?text=${waText}`;

  const cta = document.getElementById('ewWaCta');
  cta.href = waUrl;
  cta.style.display = 'flex';

  document.getElementById('ewWaCtaText').textContent = 'Continue on WhatsApp →';

  // Track WA click
  cta.onclick = () => {
    if (window.dataLayer) dataLayer.push({
      event:'whatsapp_chat_click',
      page_context: PAGE_CONTEXT,
      msg_count: msgCount
    });
  };
}

// LEAD FORM
// ════════════════════════════════════════════════════════════
function ewShowLeadForm() {
  const form = document.getElementById('ewLeadForm');
  if (!leadCaptured) form.classList.add('show');
  ewAddBotMessage('Want a **confirmed price sent to your WhatsApp**? Drop your number below — takes 5 seconds.');
}

async function ewSubmitLead() {
  const name = document.getElementById('ewLeadName').value.trim();
  const phone = document.getElementById('ewLeadPhone').value.trim();
  if (!name || !phone) return;

  leadData = { name, phone, page: PAGE_CONTEXT, timestamp: new Date().toISOString() };
  leadCaptured = true;

  // Hide form
  document.getElementById('ewLeadForm').classList.remove('show');

  // Confirm message
  ewAddBotMessage(`✅ Got it, **${name}**! Our Kochi team will WhatsApp **${phone}** within 2 hours with your confirmed quote and pickup details.`);

  // Update WA CTA with their number
  const waText = encodeURIComponent(`Hi EWasteKochi! My name is ${name}. I submitted a lead from your ${PAGE_CONTEXT} page. Please send me a quote.`);
  const cta = document.getElementById('ewWaCta');
  cta.href = `https://wa.me/${CONFIG.WA_NUMBER}?text=${waText}`;
  cta.style.display = 'flex';
  document.getElementById('ewWaCtaText').textContent = 'Message us directly on WhatsApp →';

  // Submit to Formspree
  try {
    await fetch('https://formspree.io/f/YOUR_FORM_ID', {
      method: 'POST',
      body: JSON.stringify({...leadData, conversation: conversationHistory.map(m=>m.content).join('\n')}),
      headers: {'Content-Type':'application/json','Accept':'application/json'},
    });
  } catch(_) { /* fail silently */ }

  // GTM
  if (window.dataLayer) dataLayer.push({
    event: 'chat_lead_captured',
    lead_name: name,
    page_context: PAGE_CONTEXT,
    msg_count: msgCount,
  });
}

// ════════════════════════════════════════════════════════════
// CONTEXTUAL QUICK REPLIES (dynamic based on bot response)
// ════════════════════════════════════════════════════════════
function ewGetContextualReplies(botReply) {
  const lower = botReply.toLowerCase();
  if (lower.includes('price') || lower.includes('₹') || lower.includes('quote')) {
    return ['💬 Get WhatsApp Quote', '📞 Call Now', '📋 Book Pickup'];
  }
  if (lower.includes('pickup') || lower.includes('collect')) {
    return ['📅 Book Today', '📍 My Location', '📞 Call Now'];
  }
  if (lower.includes('data') || lower.includes('nist') || lower.includes('certificate')) {
    return ['📋 NIST 800-88 Info', '🔒 See Certificate Sample', '💬 WhatsApp'];
  }
  if (lower.includes('corporate') || lower.includes('bulk') || lower.includes('itad')) {
    return ['📦 Get Bulk Quote', '🏢 Annual Contract', '📋 Compliance Docs'];
  }
  return ['💬 WhatsApp Quote', '📞 Call Now', '📋 Book Pickup'];
}

// ════════════════════════════════════════════════════════════
// AUTO-POPUP TRIGGERS
// ════════════════════════════════════════════════════════════
function initTriggers() {
  // 1. Time delay (3 seconds)
  setTimeout(() => {
    if (!isOpen) {
      // Show tooltip first, then open after 1 more second
      const tooltip = document.getElementById('ewTooltip');
      if (tooltip) tooltip.style.display = 'block';
      setTimeout(() => {
        if (!isOpen) ewOpen();
      }, 1200);
    }
  }, CONFIG.POPUP_DELAY);

  // 2. Scroll depth trigger (backup / mobile-first)
  window.addEventListener('scroll', () => {
    if (!scrollTriggered && window.scrollY > CONFIG.SCROLL_DEPTH && !isOpen) {
      scrollTriggered = true;
      ewOpen();
    }
  }, { passive:true });

  // 3. Exit intent (desktop only)
  document.addEventListener('mouseleave', (e) => {
    if (e.clientY < 10 && !isOpen && msgCount === 0) {
      ewOpen();
    }
  });
}

// ════════════════════════════════════════════════════════════
// INPUT HELPERS
// ════════════════════════════════════════════════════════════
function ewKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    ewSend();
  }
}

function ewAutoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function ewDelay(ms) { return new Promise(r => setTimeout(r, ms)); }
function ewEscape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
function ewInit() {
  buildDOM();
  initTriggers();

  // Hide tooltip initially, show after delay
  setTimeout(() => {
    const t = document.getElementById('ewTooltip');
    if (t && !isOpen) t.style.animation = 'ew-fadein .4s ease';
  }, 1500);
}

// Run when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', ewInit);
} else {
  ewInit();
}

// Expose to global for onclick attributes
window.ewToggle = ewToggle;
window.ewOpen = ewOpen;
window.ewClose = ewClose;
window.ewSend = ewSend;
window.ewHandleQuickReply = ewHandleQuickReply;
window.ewKeyDown = ewKeyDown;
window.ewAutoResize = ewAutoResize;
window.ewSubmitLead = ewSubmitLead;

})();
</script>
